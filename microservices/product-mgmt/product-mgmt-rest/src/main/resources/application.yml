server:
  port: 8082

  servlet:
    context-path: /product-mgmt
    
spring:
  application:
    name: product-mgmt

  data:
    cassandra:
      contact-points: cassandra
      port: 9042
      keyspace-name: main_db
      local-datacenter: dc1
      username: cassandra
      password: cassandra
      schema-action: none

eureka:
  client:
    register-with-eureka: true       # restister to eureka
    fetch-registry: true    
    service-url:
      defaultZone: http://localhost:8761/eureka/ 
      #defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}   
      
##--------- fien properties ---------

product:
  contextPath: "/product"
  url: "http://product-mgmt:8082"

user:
  contextPath: "/user"
  url: "http://user-mgmt:8081"    

  