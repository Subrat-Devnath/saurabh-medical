server:
  port: 8079
  
spring:
  application:
    name: api-gateway
    
  cloud:
    gateway:
      routes:
        - id: user-mgmt
          uri: lb://user-mgmt
          predicates:
            - Path=/user-mgmt/api/v1/**
                        
        - id: product-mgmt
          uri: lb://product-mgmt
          predicates:
            - Path=/product-mgmt/api/v1/**      
            
eureka:
  client:
    register-with-eureka: true       # restister to eureka
    fetch-registry: true
